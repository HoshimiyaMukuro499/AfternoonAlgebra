name: "自动打包并发布游戏"

on:
  push:
    tags:
      - "v*" # 当你推送形如 v1.0.0 的 Tag 时触发此工作流

permissions:
  contents: write # 确保工作流有权限向 Releases 写入文件

jobs:
  export_game:
    runs-on: ubuntu-latest
    name: 导出游戏任务
    steps:
      # 1. 检出仓库代码
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 调用 Godot 导出动作并自动创建 Release
      - name: export game
        uses: firebelley/godot-export@v3.0.0 # 使用社区维护的打包 Action
        with:
          # 配置你使用的 Godot 版本和模板下载地址（以下以 Godot 4.2.2 为例，可根据你的版本调整）
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          relative_project_path: ./Afternoon_algebra/coding # 你的项目 project.godot 所在的路径
          archive_output: true      # 是否将导出的文件压缩为 zip