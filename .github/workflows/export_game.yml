name: "自动打包并发布游戏"

on:
  push:
    tags:
      - "v*" # 当你推送形如 v1.0.0 的 Tag 时触发此工作流

permissions:
  contents: write # 确保工作流有权限向 Releases 写入文件

jobs:
  export_game:
    runs-on: ubuntu-latest
    name: 导出游戏任务
    steps:
      # 1. 检出仓库代码
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 调用 Godot 导出动作进行打包
      - name: export game
        id: export
        uses: firebelley/godot-export@v7.0.0 # 升级至最新的 v7.0.0 版本
        with:
          # 配置 Godot 4.2.2 的下载链接（这里使用更稳定的官方 TuxFamily 镜像源）
          godot_executable_download_url: https://downloads.tuxfamily.org/godotengine/4.2.2/Godot_v4.2.2-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://downloads.tuxfamily.org/godotengine/4.2.2/Godot_v4.2.2-stable_export_templates.tpz
          
          # 【重要：请确保这里指向包含 project.godot 的实际子目录路径】
          relative_project_path: ./Afternoon_algebra/coding
          
          archive_output: true # 导出并自动压缩为 zip

      # 3. 创建 GitHub Release 并将打包好的游戏包作为附件上传
      - name: create release
        uses: ncipollo/release-action@v1.14.0 # 推荐的 Release 管理工具
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
          tag: ${{ github.ref_name }}
          artifacts: ${{ steps.export.outputs.archive_directory }}/*