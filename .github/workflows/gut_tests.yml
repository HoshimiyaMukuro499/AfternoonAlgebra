name: CI - GUT Unit Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  gut-tests:
    runs-on: ubuntu-latest
    name: Run GUT Tests
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          # 如果你的项目不用 C#，建议把下面这行改为 false 会快很多
          include_mono: true 

      - name: Skip GUT UI Parsing
        run: touch Afternoon_algebra/coding/addons/gut/gui/.gdignore

      - name: Import Assets & Run Tests
        # 使用 bash 脚本连续执行，确保路径切换正确
        run: |
          # 1. 进入项目实际目录
          cd Afternoon_algebra/coding
          
          # 2. 强制第一遍导入 (生成 .godot 目录)
          # 我们给它 10 秒时间扫描，然后杀掉进程，因为有时候 --quit 在导入时会卡死
          timeout 20s godot --headless -e --display-driver dummy || true
          
          # 3. 第二遍确认导入 (注册 class_name)
          godot --headless -e --quit --display-driver dummy || true
          
          # 4. 正式运行 GUT 测试
          # 注意：进入目录后，--path 就可以用 "." 了
          godot --headless --path . -s res://addons/gut/gut_cmdln.gd -gdir=res://tests -ginclude_subdirs -gexit