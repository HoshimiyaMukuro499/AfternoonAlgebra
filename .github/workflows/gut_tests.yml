name: CI - GUT Unit Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  gut-tests:
    runs-on: ubuntu-latest
    name: Run GUT Tests
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          include_mono: false # 明确指定不需要 Mono 版

      # 关键步骤 1：屏蔽 GUT 的 UI 部分（这些是导致 Parse Error 的元凶）
      # 我们在 CI 里不需要 GUT 的编辑器界面，创建一个 .gdignore 文件让 Godot 忽略这个文件夹
      - name: Skip GUT UI Parsing
        run: |
          touch Afternoon_algebra/coding/addons/gut/gui/.gdignore

      # 关键步骤 2：强制多次导入
      # Godot 4 有时需要运行两次才能正确识别所有 class_name
      - name: Import Assets
        run: |
          godot --headless --path Afternoon_algebra/coding --editor --quit --display-driver dummy || true
          godot --headless --path Afternoon_algebra/coding --editor --quit --display-driver dummy || true

      # 关键步骤 3：正式运行测试
      - name: Run GUT Tests
        run: |
          godot --headless --path Afternoon_algebra/coding -s res://addons/gut/gut_cmdln.gd -gdir=res://tests -ginclude_subdirs -gexit