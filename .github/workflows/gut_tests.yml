name: CI - GUT Unit Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  gut-tests:
    runs-on: ubuntu-latest
    name: Run GUT Tests
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          # 修正参数名，Mono 版必须开启这个
          use-dotnet: true 

      - name: Debug - List Files
        run: ls -R Afternoon_algebra/coding/project.godot

      - name: Import Assets & Run Tests
        run: |
          cd Afternoon_algebra/coding
          
          # 1. 修正后的导入命令：使用 --headless 替代 --display-driver dummy
          echo "Starting import pass..."
          godot --headless --editor --quit --verbose || true
          
          # 2. 验证导入结果
          if [ -d ".godot" ]; then echo "Success: .godot folder created"; else echo "Error: .godot folder STILL MISSING"; fi

          # 3. 如果你有 C# 代码，这一步是必须的；如果是纯 GDScript，这一步也不会报错
          echo "Building project (Required for Mono)..."
          dotnet build || true

          # 4. 正式运行 GUT 测试
          echo "Starting GUT tests..."
          # 显式使用 --headless 并指向入口
          godot --headless -s res://addons/gut/gut_cmdln.gd -gdir=res://tests -ginclude_subdirs -gexit