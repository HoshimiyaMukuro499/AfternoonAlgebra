name: CI - GUT Unit Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  gut-tests:
    runs-on: ubuntu-latest
    name: Run GUT Tests
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 第一步：安装 Godot 4.6.2
      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          # 填入你截图中的版本号
          version: 4.6.2
          # 如果 4.6.2 是官方版本，它会自动下载；
          # 如果它是自定义版本，Action 可能会报错，到时候我们需要换一种下载方式。
          # 但目前先按这个填。

      # 第二步：直接通过命令行运行 GUT
      - name: Run GUT Tests
        run: |
          godot --headless --path Afternoon_algebra/coding -s res://addons/gut/gut_cmdln.gd