name: CI - GUT Unit Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  gut-tests:
    runs-on: ubuntu-latest
    name: Run GUT Tests
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.2.1 # 建议先用 4.2.1 稳定版试试，你的 4.6 可能是某个特殊版本

      # 【关键的一步】：初次导入资源
      # 这会生成 .godot 文件夹并注册所有 class_name
      - name: Import Assets
        run: |
          godot --headless --path Afternoon_algebra/coding --editor --quit || true

      # 第二步：正式运行测试
      - name: Run GUT Tests
        run: |
          godot --headless --path Afternoon_algebra/coding -s res://addons/gut/gut_cmdln.gd